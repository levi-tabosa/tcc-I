services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: camara_backend
    environment:
      - DATABASE_URL_CAMARA=postgresql://postgres:postgres@postgres:5432/camara_db
      - DATABASE_URL_SENADO=postgresql://postgres:postgres@postgres:5432/senado_db
      - API_KEY=${API_KEY} # obtido  .env na pasta raiz do projeto
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    networks:
      - camara-network
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "python main.py"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: camara_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - camara-network
    environment:
      - VITE_API_URL=http://localhost:8000

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: camara_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - camara-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 15

networks:
  camara-network:
    driver: bridge

volumes:
  pgdata: {}
