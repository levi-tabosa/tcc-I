<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="premium-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.9);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.4);stop-opacity:1" />
    </linearGradient>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Subtle background glow -->
  <circle cx="100" cy="100" r="85" fill="white" fill-opacity="0.03" />
  <circle cx="100" cy="100" r="85" stroke="white" stroke-opacity="0.08" stroke-width="1.5" />
  
  <g filter="url(#soft-glow)">
    <!-- Head silhouette -->
    <path 
      d="M100 90C116.569 90 130 76.5685 130 60C130 43.4315 116.569 30 100 30C83.4315 30 70 43.4315 70 60C70 76.5685 83.4315 90 100 90Z" 
      stroke="url(#premium-gradient)" 
      stroke-width="5" 
      stroke-linecap="round" 
      stroke-linejoin="round"
    />
    <!-- Bust/Shoulders with smooth curves -->
    <path 
      d="M35 160C35 126.863 61.8629 100 95 100H105C138.137 100 165 126.863 165 160V175H35V160Z" 
      stroke="url(#premium-gradient)" 
      stroke-width="5" 
      stroke-linecap="round" 
      stroke-linejoin="round"
    />
    
    <!-- Subtle separator between head and body for depth -->
    <path d="M85 105C95 102 105 102 115 105" stroke="white" stroke-opacity="0.2" stroke-width="2" stroke-linecap="round" />
  </g>
</svg>
